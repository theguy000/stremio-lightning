name: Build & Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  linux:
    runs-on: ubuntu-latest
    container:
      # GNOME 50 is based on the Freedesktop 25.08 runtime. Keep bundled host
      # libraries below its GLIBC ceiling; xtask rejects newer symbols.
      image: ubuntu:questing
      options: --privileged
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Install system dependencies (Linux)
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            ca-certificates \
            clang \
            curl \
            flatpak \
            flatpak-builder \
            gh \
            git \
            libgtk-4-dev \
            libmpv-dev \
            librsvg2-dev \
            libwebkitgtk-6.0-dev \
            mold \
            nodejs \
            patchelf \
            pkg-config

      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set dynamic release version in files
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="$github.ref_name"
          VERSION="${TAG#v}"
          echo "Setting version to $VERSION"
          node scripts/bump-version.cjs "$VERSION"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate Rust before packaging
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets
          cargo test --workspace

      - name: Build frontend
        run: cargo xtask build-ui

      - name: Download Linux shell dependencies
        run: cargo xtask setup-linux
        env:
          GH_TOKEN: $secrets.GITHUB_TOKEN

      - name: Download appimagetool
        run: |
          mkdir -p "$HOME/.cache/appimage"
          curl -L --fail "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -o "$HOME/.cache/appimage/appimagetool-x86_64.AppImage"
          chmod +x "$HOME/.cache/appimage/appimagetool-x86_64.AppImage"

      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --noninteractive flathub org.gnome.Platform//50 org.gnome.Sdk//50 org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Build Linux AppImage
        run: cargo xtask package-linux-appimage

      - name: Build Linux installer package
        run: cargo xtask package-linux-deb

      - name: Build Linux Flatpak bundle
        run: cargo xtask package-linux-flatpak-builder

      - name: Verify Linux artifact
        run: |
          test -s dist/Stremio_Lightning_Linux-x86_64.AppImage
          test -s dist/stremio-lightning-linux-amd64.deb
          test -s dist/Stremio_Lightning_Linux-x86_64.flatpak

      - name: Upload Linux portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stremio_Lightning_Linux-x86_64.AppImage
          path: dist/Stremio_Lightning_Linux-x86_64.AppImage

      - name: Upload Linux installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: stremio-lightning-linux-amd64.deb
          path: dist/stremio-lightning-linux-amd64.deb

      - name: Upload Linux Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stremio_Lightning_Linux-x86_64.flatpak
          path: dist/Stremio_Lightning_Linux-x86_64.flatpak

  windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set dynamic release version in files
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="$github.ref_name"
          VERSION="${TAG#v}"
          echo "Setting version to $VERSION"
          node scripts/bump-version.cjs "$VERSION"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: cargo xtask build-ui

      - name: Download Windows shell dependencies
        run: cargo xtask setup-windows
        env:
          GH_TOKEN: $secrets.GITHUB_TOKEN

      - name: Package Windows portable artifact
        run: cargo xtask package-windows-portable

      - name: Package Windows installer artifact
        run: cargo xtask package-windows-installer

      - name: Verify Windows artifacts
        shell: pwsh
        run: |
          $zip = "dist/stremio-lightning-windows-portable.zip"
          if (-not (Test-Path $zip)) {
            throw "Missing Windows portable zip: $zip"
          }

          $installer = "dist/stremio-lightning-windows-setup.exe"
          if (-not (Test-Path $installer)) {
            throw "Missing Windows installer: $installer"
          }
          if ((Get-Item $installer).Length -eq 0) {
            throw "Windows installer is empty: $installer"
          }

          $contents = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zip))
          try {
            $names = $contents.Entries.FullName
            $required = @(
              "stremio-lightning-windows.exe",
              "libmpv-2.dll",
              "resources/stremio-runtime.exe",
              "resources/server.cjs",
              "resources/ffmpeg.exe",
              "resources/ffprobe.exe"
            )

            foreach ($name in $required) {
              if ($names -notcontains $name) {
                throw "Windows portable zip is missing $name"
              }
            }
          } finally {
            $contents.Dispose()
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: stremio-lightning-windows-portable.zip
          path: dist/stremio-lightning-windows-portable.zip

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: stremio-lightning-windows-setup.exe
          path: dist/stremio-lightning-windows-setup.exe

  macos-arm64:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set dynamic release version in files
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="$github.ref_name"
          VERSION="${TAG#v}"
          echo "Setting version to $VERSION"
          node scripts/bump-version.cjs "$VERSION"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install mpv (libmpv)
        run: brew install mpv

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: cargo xtask build-ui

      - name: Download macOS shell dependencies (arm64)
        run: cargo xtask setup-macos --arch arm64
        env:
          GH_TOKEN: $secrets.GITHUB_TOKEN

      - name: Package macOS app bundle and DMG (arm64)
        run: cargo xtask package-macos-dmg --arch arm64

      - name: Sign and notarize (skipped unless signing secrets are configured)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          MACOS_CERT_P12: $secrets.MACOS_CERT_P12
          MACOS_CERT_PASSWORD: $secrets.MACOS_CERT_PASSWORD
          APPLE_ID: $secrets.APPLE_ID
          APPLE_TEAM_ID: $secrets.APPLE_TEAM_ID
          NOTARIZATION_PWD: $secrets.NOTARIZATION_PWD
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12:-}" ]; then
            echo "Signing secrets not configured; shipping the ad-hoc signed build."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          printf '%s' "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F '"' '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: no Developer ID Application identity found in imported certificate" >&2
            exit 1
          fi
          APP="dist/Stremio Lightning.app"
          codesign --force --deep --options runtime             --entitlements "$APP/Contents/Resources/entitlements.plist"             --sign "$IDENTITY" --keychain "$KEYCHAIN" "$APP"
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ] && [ -n "${NOTARIZATION_PWD:-}" ]; then
            ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/StremioLightning.zip"
            xcrun notarytool submit "$RUNNER_TEMP/StremioLightning.zip"               --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID"               --password "$NOTARIZATION_PWD" --wait
            xcrun stapler staple "$APP"
          else
            echo "Notarization secrets not configured; skipping notarization."
          fi
          STAGING="$RUNNER_TEMP/dmg-arm64"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          ditto "$APP" "$STAGING/Stremio Lightning.app"
          ln -s /Applications "$STAGING/Applications"
          rm -f "dist/Stremio_Lightning_macOS-arm64.dmg"
          hdiutil create -volname "Stremio Lightning" -srcfolder "$STAGING" -ov -format UDZO "dist/Stremio_Lightning_macOS-arm64.dmg"
          codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN" "dist/Stremio_Lightning_macOS-arm64.dmg"

      - name: Verify macOS artifacts (arm64)
        run: |
          test -d "dist/Stremio Lightning.app"
          test -x "dist/Stremio Lightning.app/Contents/MacOS/stremio-lightning-macos"
          test -s "dist/Stremio_Lightning_macOS-arm64.dmg"

      - name: Upload macOS DMG artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: Stremio_Lightning_macOS-arm64.dmg
          path: dist/Stremio_Lightning_macOS-arm64.dmg

  macos-x86_64:
    runs-on: macos-15-intel
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set dynamic release version in files
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="$github.ref_name"
          VERSION="${TAG#v}"
          echo "Setting version to $VERSION"
          node scripts/bump-version.cjs "$VERSION"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install mpv (libmpv)
        run: brew install mpv

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: cargo xtask build-ui

      - name: Download macOS shell dependencies (x86_64)
        run: cargo xtask setup-macos --arch x86_64
        env:
          GH_TOKEN: $secrets.GITHUB_TOKEN

      - name: Package macOS app bundle and DMG (x86_64)
        run: cargo xtask package-macos-dmg --arch x86_64

      - name: Sign and notarize (skipped unless signing secrets are configured)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          MACOS_CERT_P12: $secrets.MACOS_CERT_P12
          MACOS_CERT_PASSWORD: $secrets.MACOS_CERT_PASSWORD
          APPLE_ID: $secrets.APPLE_ID
          APPLE_TEAM_ID: $secrets.APPLE_TEAM_ID
          NOTARIZATION_PWD: $secrets.NOTARIZATION_PWD
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12:-}" ]; then
            echo "Signing secrets not configured; shipping the ad-hoc signed build."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          printf '%s' "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F '"' '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: no Developer ID Application identity found in imported certificate" >&2
            exit 1
          fi
          APP="dist/Stremio Lightning.app"
          codesign --force --deep --options runtime             --entitlements "$APP/Contents/Resources/entitlements.plist"             --sign "$IDENTITY" --keychain "$KEYCHAIN" "$APP"
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ] && [ -n "${NOTARIZATION_PWD:-}" ]; then
            ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/StremioLightning.zip"
            xcrun notarytool submit "$RUNNER_TEMP/StremioLightning.zip"               --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID"               --password "$NOTARIZATION_PWD" --wait
            xcrun stapler staple "$APP"
          else
            echo "Notarization secrets not configured; skipping notarization."
          fi
          STAGING="$RUNNER_TEMP/dmg-x86_64"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          ditto "$APP" "$STAGING/Stremio Lightning.app"
          ln -s /Applications "$STAGING/Applications"
          rm -f "dist/Stremio_Lightning_macOS-x86_64.dmg"
          hdiutil create -volname "Stremio Lightning" -srcfolder "$STAGING" -ov -format UDZO "dist/Stremio_Lightning_macOS-x86_64.dmg"
          codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN" "dist/Stremio_Lightning_macOS-x86_64.dmg"

      - name: Verify macOS artifacts (x86_64)
        run: |
          test -d "dist/Stremio Lightning.app"
          test -x "dist/Stremio Lightning.app/Contents/MacOS/stremio-lightning-macos"
          test -s "dist/Stremio_Lightning_macOS-x86_64.dmg"

      - name: Upload macOS DMG artifact (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: Stremio_Lightning_macOS-x86_64.dmg
          path: dist/Stremio_Lightning_macOS-x86_64.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows, macos-arm64, macos-x86_64]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Stremio_Lightning_Linux-x86_64.AppImage
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: stremio-lightning-windows-portable.zip
          path: release-assets

      - name: Download Linux installer artifact
        uses: actions/download-artifact@v4
        with:
          name: stremio-lightning-linux-amd64.deb
          path: release-assets

      - name: Download Linux Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: Stremio_Lightning_Linux-x86_64.flatpak
          path: release-assets

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: stremio-lightning-windows-setup.exe
          path: release-assets

      - name: Download macOS arm64 DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: Stremio_Lightning_macOS-arm64.dmg
          path: release-assets

      - name: Download macOS x86_64 DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: Stremio_Lightning_macOS-x86_64.dmg
          path: release-assets

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: $secrets.GITHUB_TOKEN
        with:
          draft: true
          prerelease: false
          files: |
            release-assets/Stremio_Lightning_Linux-x86_64.AppImage
            release-assets/stremio-lightning-linux-amd64.deb
            release-assets/Stremio_Lightning_Linux-x86_64.flatpak
            release-assets/stremio-lightning-windows-portable.zip
            release-assets/stremio-lightning-windows-setup.exe
            release-assets/Stremio_Lightning_macOS-arm64.dmg
            release-assets/Stremio_Lightning_macOS-x86_64.dmg
