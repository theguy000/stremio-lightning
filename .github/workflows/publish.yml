name: Build & Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: cargo xtask build-ui

      - name: Download Linux shell dependencies
        run: cargo xtask setup-linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download appimagetool
        run: |
          mkdir -p "$HOME/.cache/appimage"
          curl -L "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -o "$HOME/.cache/appimage/appimagetool-x86_64.AppImage"
          chmod +x "$HOME/.cache/appimage/appimagetool-x86_64.AppImage"

      - name: Build Linux AppImage
        run: cargo xtask build-linux-appimage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stremio_Lightning_Linux-x86_64.AppImage
          path: dist/Stremio_Lightning_Linux-x86_64.AppImage

      - name: Upload Linux release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          prerelease: false
          files: dist/Stremio_Lightning_Linux-x86_64.AppImage

  windows:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: cargo xtask build-ui

      - name: Download Windows shell dependencies
        run: cargo xtask setup-windows

      - name: Package Windows portable artifact
        run: cargo xtask package-windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: stremio-lightning-windows-portable.zip
          path: dist/stremio-lightning-windows-portable.zip

      - name: Upload Windows release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          prerelease: false
          files: dist/stremio-lightning-windows-portable.zip
